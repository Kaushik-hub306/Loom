[project]
name = "loom-agent"
version = "0.2.0"
description = "The memory layer for AI coding agents — GitHub App that learns from PR feedback and auto-updates agent configs"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]
server = [
    "fastapi>=0.100",
    "uvicorn>=0.23",
    "python-jose>=3.3",
    "httpx>=0.24",
    "pydantic>=2.0",
]
semantic = [
    "numpy>=1.24",
    "sentence-transformers>=2.2",
]
integrations = [
    "slack-sdk>=3.27",
]

[project.scripts]
loom-server = "loom.server.api:main"


[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["loom*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
