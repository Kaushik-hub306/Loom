[project]
name = "loom-agent"
version = "0.1.0"
description = "The memory layer for AI coding agents — learns from PR feedback so your agents get smarter every run"
requires-python = ">=3.11"
dependencies = [
    "click>=8.0",
    "rich>=13.0",
    "httpx>=0.27",
]

[project.scripts]
loom = "loom.cli:main"

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"
