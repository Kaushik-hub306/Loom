[project]
name = "loom-agent"
version = "0.2.0"
description = "The memory layer for AI agents — learns conventions from observation, teaching, and reflection"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]
llm = [
    "anthropic>=0.30.0",
]


[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["loom*"]
