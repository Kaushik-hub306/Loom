[project]
name = "loom-agent"
version = "0.1.0"
description = "Outcome-driven memory layer for AI coding agents — MCP-native"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["loom*"]
